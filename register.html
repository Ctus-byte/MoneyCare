<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng ký - MoneyCare</title>
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <div class="auth-box">
    <h1>MoneyCare</h1>
    <h2>Đăng ký</h2>

    <input type="text" id="register-name" placeholder="Họ tên">
    <input type="email" id="register-email" placeholder="Email">
    <input type="password" id="register-password" placeholder="Mật khẩu">
    <input type="password" id="register-confirm" placeholder="Nhập lại mật khẩu">

    <button id="register-btn">Đăng ký</button>

    <p>
      Đã có tài khoản?
      <a href="login.html">Đăng nhập</a>
    </p>

    <div id="auth-message"></div>
  </div>

  <script type="module" src="js/register.js"></script>
</body>
</html>
